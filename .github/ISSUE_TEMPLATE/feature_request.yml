name: Feature request
description: Suggest an improvement or new capability for symphony-ts.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or operator problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the change you want.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you consider?
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Worker
        - Dashboard
        - Shared package
        - Database schema
        - CI or release
        - Documentation
        - Unsure
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation idea
      description: How could maintainers verify this works?
    validations:
      required: false
