name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  checks:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Format
            command: pnpm format:check
          - name: Lint
            command: pnpm lint
          - name: Test
            command: pnpm test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.15.0
      - uses: actions/setup-node@v4
        with:
          cache: pnpm
          node-version: 22
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run ${{ matrix.name }}
        run: ${{ matrix.command }}
